name: Build & Deploy SEO Agent

on:
  workflow_dispatch:
  push:
    branches:
      - DEV
      - QA
      - DEMO24
      - main

concurrency:
  group: ec2-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy - ${{ github.ref_name }}

    concurrency:
      group: repo-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.ACCESSKEYID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRETKEY }}
      AWS_DEFAULT_REGION: us-east-2
      APPSETTINGS_JSON: ${{ secrets.APPSETTINGS_JSON }}

    runs-on:
      - self-hosted
      - ${{ 
          github.ref_name == 'DEV' && 'dev' ||
          github.ref_name == 'QA' && 'qa' ||
          github.ref_name == 'DEMO24' && 'uat' ||
          'prod'
        }}

    steps:

      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # Resolve Environment
      # ------------------------------------------------------------
      - name: Resolve Environment
        run: |
          case "${{ github.ref_name }}" in
            DEV)
              echo "ENV=DEV" >> $GITHUB_ENV
              echo "CONFIG_URL=${{ secrets.CONFIG_SERVER_DEV }}" >> $GITHUB_ENV
              echo "PORT=8011" >> $GITHUB_ENV
              ;;
            QA)
              echo "ENV=QA" >> $GITHUB_ENV
              echo "CONFIG_URL=${{ secrets.CONFIG_SERVER_QA }}" >> $GITHUB_ENV
              echo "PORT=8012" >> $GITHUB_ENV
              ;;
            DEMO24)
              echo "ENV=DEMO" >> $GITHUB_ENV
              echo "CONFIG_URL=${{ secrets.CONFIG_SERVER_DEMO }}" >> $GITHUB_ENV
              echo "PORT=8013" >> $GITHUB_ENV
              ;;
            main)
              echo "ENV=PROD" >> $GITHUB_ENV
              echo "CONFIG_URL=${{ secrets.CONFIG_SERVER_PROD }}" >> $GITHUB_ENV
              echo "PORT=8011" >> $GITHUB_ENV
              ;;
          esac
          echo "GIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "IMAGE_NAME=$(basename "$GITHUB_REPOSITORY")" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # Verify Secrets (safe - shows length only)
      # ------------------------------------------------------------
      - name: Verify AWS Credentials
        run: |
          echo "Access Key length: ${#AWS_ACCESS_KEY_ID}"
          echo "Secret Key length: ${#AWS_SECRET_ACCESS_KEY}"
          aws sts get-caller-identity

      # ------------------------------------------------------------
      # Build & Deploy
      # ------------------------------------------------------------
      - name: Build & Deploy Container
        shell: bash
        run: |
          set -e

          IMAGE_TAG="${IMAGE_NAME}:${ENV}-${GIT_SHA}"
          CONTAINER_NAME="seo-agent-${ENV}"

          echo "====================================="
          echo "Container : $CONTAINER_NAME"
          echo "Image     : $IMAGE_TAG"
          echo "Port      : $PORT"
          echo "Env       : $ENV"
          echo "====================================="

          # Self-hosted runners sometimes leave appsettings.json as a directory (breaks docker -v)
          if [ -e appsettings.json ] && [ ! -f appsettings.json ]; then
            rm -rf appsettings.json
            echo "Removed appsettings.json directory from a prior failed deploy"
          fi

          if [ ! -f appsettings.json ]; then
            if [ -n "$APPSETTINGS_JSON" ]; then
              printf '%s\n' "$APPSETTINGS_JSON" > appsettings.json
              echo "Wrote appsettings.json from APPSETTINGS_JSON secret"
            elif [ -f appsettings.example.json ]; then
              cp appsettings.example.json appsettings.json
              echo "WARN: Using appsettings.example.json — set APPSETTINGS_JSON secret for production keys/DB"
            else
              echo "ERROR: appsettings.json missing and no appsettings.example.json in repo."
              exit 1
            fi
          fi

          if [ ! -f appsettings.json ]; then
            echo "ERROR: appsettings.json must be a regular file before docker build"
            exit 1
          fi
          echo "appsettings.json OK ($(wc -c < appsettings.json) bytes)"

          echo "Building image (appsettings baked into image)..."
          docker build --no-cache -t "$IMAGE_TAG" .

          echo "Creating volume..."
          docker volume create "hiperbrains-${ENV}-data" || true

          echo "Creating .env file..."
          printf '%s\n' \
            'NODE_ENV=production' \
            'PORT=8080' \
            'DB_PATH=/app/data/app.db' \
            > .env

          node scripts/merge-appsettings-into-env.js appsettings.json .env

          echo "Loading database settings from config server..."
          if [ -z "$CONFIG_URL" ]; then
            echo "WARN: CONFIG_URL empty — set CONFIG_SERVER_DEV secret or APPSETTINGS_JSON ConnectionStrings"
          else
            export CONFIG_URL="$CONFIG_URL"
            node scripts/append-config-to-env.js .env || echo "WARN: config server fetch failed"
            node scripts/merge-appsettings-into-env.js appsettings.json .env
          fi

          if grep -qE '^HIPERBRAINS_DATABASE=|^DATABASE_URL=' .env 2>/dev/null; then
            echo "PostgreSQL env configured (multi-tenant / login enabled)"
          else
            echo "WARN: No HIPERBRAINS_DATABASE in .env — /api/auth/mode will be multiTenant:false"
          fi

          NEXT_NAME="${CONTAINER_NAME}-next"
          PROBE_PORT=$((PORT + 100))

          docker rm -f "$NEXT_NAME" 2>/dev/null || true
          echo "Starting probe container on 127.0.0.1:${PROBE_PORT}..."
          docker run -d \
            --name "$NEXT_NAME" \
            -p "127.0.0.1:${PROBE_PORT}:8080" \
            --env-file .env \
            -e ConfigUrl="$CONFIG_URL" \
            -v "hiperbrains-${ENV}-data:/app/data" \
            --log-driver=json-file \
            "$IMAGE_TAG"

          echo "Waiting for /health..."
          healthy=0
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:${PROBE_PORT}/health" >/dev/null; then
              healthy=1
              break
            fi
            sleep 2
          done
          if [ "$healthy" -ne 1 ]; then
            echo "ERROR: New container failed health check"
            docker logs "$NEXT_NAME" --tail 80 || true
            docker rm -f "$NEXT_NAME" 2>/dev/null || true
            exit 1
          fi
          echo "Health check passed"
          docker rm -f "$NEXT_NAME" 2>/dev/null || true

          PREVIOUS_IMAGE=""
          if docker inspect "$CONTAINER_NAME" >/dev/null 2>&1; then
            PREVIOUS_IMAGE=$(docker inspect "$CONTAINER_NAME" --format '{{.Config.Image}}' 2>/dev/null || true)
          fi
          if [ -z "$PREVIOUS_IMAGE" ]; then
            PREVIOUS_IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' \
              | grep -E "^${IMAGE_NAME}:${ENV}-" \
              | grep -v "$IMAGE_TAG" \
              | head -n 1 || true)
          fi
          echo "Previous image (rollback): ${PREVIOUS_IMAGE:-none}"

          rollback_previous() {
            if [ -z "$PREVIOUS_IMAGE" ]; then
              echo "WARN: No previous image to roll back"
              return 1
            fi
            echo "Rolling back to $PREVIOUS_IMAGE on port ${PORT}..."
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
            docker run -d \
              --name "$CONTAINER_NAME" \
              -p "0.0.0.0:${PORT}:8080" \
              --env-file .env \
              -e ConfigUrl="$CONFIG_URL" \
              -v "hiperbrains-${ENV}-data:/app/data" \
              --restart unless-stopped \
              --log-driver=json-file \
              "$PREVIOUS_IMAGE"
            sleep 3
            if curl -sf "http://127.0.0.1:${PORT}/health" >/dev/null; then
              echo "Rollback healthy — site restored on previous image"
              return 0
            fi
            echo "ERROR: Rollback container also failed health check"
            docker logs "$CONTAINER_NAME" --tail 80 || true
            return 1
          }

          echo "Stopping old containers..."
          docker stop "$CONTAINER_NAME" 2>/dev/null || true
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
          docker stop SEOAgent 2>/dev/null || true
          docker rm -f SEOAgent 2>/dev/null || true

          echo "Starting production container on port ${PORT}..."
          docker run -d \
            --name "$CONTAINER_NAME" \
            -p "0.0.0.0:${PORT}:8080" \
            --env-file .env \
            -e ConfigUrl="$CONFIG_URL" \
            -v "hiperbrains-${ENV}-data:/app/data" \
            --restart unless-stopped \
            --log-driver=json-file \
            "$IMAGE_TAG"

          prod_healthy=0
          for i in $(seq 1 20); do
            if curl -sf "http://127.0.0.1:${PORT}/health" >/dev/null; then
              prod_healthy=1
              break
            fi
            sleep 2
          done
          if [ "$prod_healthy" -ne 1 ]; then
            echo "ERROR: Production container not healthy on port ${PORT}"
            docker logs "$CONTAINER_NAME" --tail 80 || true
            rollback_previous || true
            exit 1
          fi

          echo "Cleaning unused images..."
          docker image prune -f

          echo "====================================="
          echo "Deploy complete: http://127.0.0.1:${PORT}/health OK"
          echo "====================================="
