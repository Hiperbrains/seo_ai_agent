name: Build & Deploy SEO Agent

on:
  workflow_dispatch:
  push:
    branches:
      - DEV
      - QA
      - DEMO24
      - main

concurrency:
  group: ec2-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy - ${{ github.ref_name }}

    concurrency:
      group: repo-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.ACCESSKEYID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRETKEY }}
      AWS_DEFAULT_REGION: us-east-2
      APPSETTINGS_JSON: ${{ secrets.APPSETTINGS_JSON }}

    runs-on:
      - self-hosted
      - ${{ 
          github.ref_name == 'DEV' && 'dev' ||
          github.ref_name == 'QA' && 'qa' ||
          github.ref_name == 'DEMO24' && 'uat' ||
          'prod'
        }}

    steps:

      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # Resolve Environment
      # ------------------------------------------------------------
      - name: Resolve Environment
        run: |
          case "${{ github.ref_name }}" in
            DEV)
              echo "ENV=DEV" >> $GITHUB_ENV
              echo "CONFIG_URL=${{ secrets.CONFIG_SERVER_DEV }}" >> $GITHUB_ENV
              echo "PORT=8011" >> $GITHUB_ENV
              ;;
            QA)
              echo "ENV=QA" >> $GITHUB_ENV
              echo "CONFIG_URL=${{ secrets.CONFIG_SERVER_QA }}" >> $GITHUB_ENV
              echo "PORT=8012" >> $GITHUB_ENV
              ;;
            DEMO24)
              echo "ENV=DEMO" >> $GITHUB_ENV
              echo "CONFIG_URL=${{ secrets.CONFIG_SERVER_DEMO }}" >> $GITHUB_ENV
              echo "PORT=8013" >> $GITHUB_ENV
              ;;
            main)
              echo "ENV=PROD" >> $GITHUB_ENV
              echo "CONFIG_URL=${{ secrets.CONFIG_SERVER_PROD }}" >> $GITHUB_ENV
              echo "PORT=8011" >> $GITHUB_ENV
              ;;
          esac
          echo "GIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "IMAGE_NAME=$(basename "$GITHUB_REPOSITORY")" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # Verify Secrets (safe - shows length only)
      # ------------------------------------------------------------
      - name: Verify AWS Credentials
        run: |
          echo "Access Key length: ${#AWS_ACCESS_KEY_ID}"
          echo "Secret Key length: ${#AWS_SECRET_ACCESS_KEY}"
          aws sts get-caller-identity

      # ------------------------------------------------------------
      # Build & Deploy
      # ------------------------------------------------------------
      - name: Build & Deploy Container
        shell: bash
        run: |
          set -e

          IMAGE_TAG="${IMAGE_NAME}:${ENV}-${GIT_SHA}"
          CONTAINER_NAME="seo-agent-${ENV}"

          echo "====================================="
          echo "Container : $CONTAINER_NAME"
          echo "Image     : $IMAGE_TAG"
          echo "Port      : $PORT"
          echo "Env       : $ENV"
          echo "====================================="

          # Self-hosted runners sometimes leave appsettings.json as a directory (breaks docker -v)
          if [ -e appsettings.json ] && [ ! -f appsettings.json ]; then
            rm -rf appsettings.json
            echo "Removed appsettings.json directory from a prior failed deploy"
          fi

          if [ ! -f appsettings.json ]; then
            if [ -n "$APPSETTINGS_JSON" ]; then
              printf '%s\n' "$APPSETTINGS_JSON" > appsettings.json
              echo "Wrote appsettings.json from APPSETTINGS_JSON secret"
            elif [ -f appsettings.example.json ]; then
              cp appsettings.example.json appsettings.json
              echo "WARN: Using appsettings.example.json — set APPSETTINGS_JSON secret for production keys/DB"
            else
              echo "ERROR: appsettings.json missing and no appsettings.example.json in repo."
              exit 1
            fi
          fi

          if [ ! -f appsettings.json ]; then
            echo "ERROR: appsettings.json must be a regular file before docker build"
            exit 1
          fi
          echo "appsettings.json OK ($(wc -c < appsettings.json) bytes)"

          echo "Building image (appsettings baked into image, no runtime mount)..."
          docker build --no-cache -t "$IMAGE_TAG" .

          echo "Stopping existing container..."
          docker stop "$CONTAINER_NAME" 2>/dev/null || true
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
          docker stop SEOAgent 2>/dev/null || true
          docker rm -f SEOAgent 2>/dev/null || true

          echo "Creating volume..."
          docker volume create "hiperbrains-${ENV}-data" || true

          echo "Creating .env file..."
          cat > .env <<EOF
          NODE_ENV=production
          PORT=8080
          DB_PATH=/app/data/app.db
          EOF

          echo "Loading database settings from config server..."
          if [ -z "$CONFIG_URL" ]; then
            echo "WARN: CONFIG_URL empty — set CONFIG_SERVER_DEV (or APP) GitHub secret"
          else
            export CONFIG_URL="$CONFIG_URL"
            node scripts/append-config-to-env.js .env || echo "WARN: config server fetch failed"
          fi
          if grep -qE '^HIPERBRAINS_DATABASE=|^DATABASE_URL=' .env 2>/dev/null; then
            echo "PostgreSQL env configured (multi-tenant / login enabled)"
          else
            echo "WARN: No HIPERBRAINS_DATABASE in .env — check APPSETTINGS_JSON ConnectionStrings or CONFIG_SERVER_*"
          fi

          echo "Starting new container..."
          docker run -d \
            --name "$CONTAINER_NAME" \
            -p "${PORT}:8080" \
            --env-file .env \
            -e ConfigUrl="$CONFIG_URL" \
            -v "hiperbrains-${ENV}-data:/app/data" \
            --restart unless-stopped \
            --log-driver=awslogs \
            --log-opt awslogs-region=us-east-2 \
            --log-opt awslogs-group=hiperbrains-api \
            --log-opt awslogs-create-group=true \
            --log-opt awslogs-stream="$CONTAINER_NAME" \
            "$IMAGE_TAG"

          echo "Cleaning unused images..."
          docker image prune -f

          echo "====================================="
          echo "Deploy complete: $CONTAINER_NAME on port $PORT"
          echo "====================================="
