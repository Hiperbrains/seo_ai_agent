@if (!showShell()) {
  <router-outlet />
} @else {
<div class="shell">
  <aside class="sidebar">
    <a routerLink="/" class="brand brand--link" title="AI SEO Agent — Home">
      <span class="brand-mark">
        <svg class="brand-mark__ico" viewBox="0 0 44 44" width="40" height="40" aria-hidden="true" focusable="false">
          <path
            d="M22 4.5 35.5 12.25v19.5L22 39.5 8.5 31.75v-19.5L22 4.5z"
            fill="#ecfdf5"
            stroke="#22bd52"
            stroke-width="2"
            stroke-linejoin="round"
          />
          <g class="brand-mark__glyph" fill="currentColor">
            <line x1="22" y1="12.5" x2="22" y2="17.2" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" />
            <circle cx="22" cy="21.5" r="4.25" />
            <line x1="22" y1="25.8" x2="22" y2="31.5" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" />
          </g>
        </svg>
        <span class="brand-mark__text">AI SEO Agent</span>
      </span>
    </a>
    <nav class="side-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="side-nav__link">
        <span class="side-nav__ico" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M4 11L12 4l8 7v9a1 1 0 01-1 1h-5v-6H10v6H5a1 1 0 01-1-1v-9z" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
        <span>Dashboard</span>
      </a>
      <a routerLink="/domains" routerLinkActive="active" class="side-nav__link">
        <span class="side-nav__ico" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <circle cx="12" cy="12" r="9" />
            <path d="M3 12h18M12 3a15 15 0 010 18" />
          </svg>
        </span>
        <span>Domains</span>
      </a>
      <a routerLink="/scans" routerLinkActive="active" class="side-nav__link">
        <span class="side-nav__ico" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M4 19V5M8 19V9M12 19v-6M16 19V7M20 19v-9" stroke-linecap="round" />
          </svg>
        </span>
        <span>Scans</span>
      </a>
      <a routerLink="/automatic-scheduler" routerLinkActive="active" class="side-nav__link">
        <span class="side-nav__ico" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <rect x="3" y="5" width="18" height="16" rx="2" />
            <path d="M16 3v4M8 3v4M3 11h18" stroke-linecap="round" />
          </svg>
        </span>
        <span>Automatic Scheduler</span>
      </a>
      <a routerLink="/issue-create" routerLinkActive="active" class="side-nav__link">
        <span class="side-nav__ico" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <circle cx="12" cy="12" r="9" />
            <path d="M12 8v8M8 12h8" stroke-linecap="round" />
          </svg>
        </span>
        <span>Issue Create</span>
      </a>
      <a routerLink="/settings" routerLinkActive="active" class="side-nav__link">
        <span class="side-nav__ico" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <circle cx="12" cy="8" r="3" />
            <path d="M6 19v-1a6 6 0 0112 0v1" stroke-linecap="round" />
          </svg>
        </span>
        <span>Settings</span>
      </a>
    </nav>
    @if (auth.multiTenant() && auth.company()) {
      <div class="sidebar-user">
        <p class="sidebar-user__name">{{ auth.company()!.companyName }}</p>
        <p class="sidebar-user__email">{{ auth.company()!.email }}</p>
        <button type="button" class="btn-signout" (click)="signOut()">Sign out</button>
      </div>
    }
  </aside>
  <main class="main">
    <router-outlet />
  </main>
</div>
}
